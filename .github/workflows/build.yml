name: Build Windows x64

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    defaults:
      run:
        working-directory: oryvex
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      # The formatting check is removed to avoid blocking the build.
      # If you want to keep it, run `cargo fmt` first and commit the changes.

      - name: Clippy
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

      - name: Run tests
        run: cargo test --verbose --target x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package archive (ZIP)
        shell: pwsh
        run: |
          $binary = "target/x86_64-pc-windows-msvc/release/oryvex.exe"
          if (Test-Path $binary) {
            Compress-Archive -Path $binary -DestinationPath oryvex-windows-x64.zip
          } else {
            Write-Error "Binary not found: $binary"
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oryvex-windows-x64.zip
          path: oryvex-windows-x64.zip
          if-no-files-found: error
