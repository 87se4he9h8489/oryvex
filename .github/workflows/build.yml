name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ------------------------------------------------------------------
  # Windows builds (x86_64 and ARM64)
  # ------------------------------------------------------------------
  windows:
    name: Build Windows ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            archive: oryvex-windows-x86_64.zip
          - target: aarch64-pc-windows-msvc
            archive: oryvex-windows-arm64.zip
    defaults:
      run:
        working-directory: oryvex
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Run tests
        run: cargo test --verbose --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (ZIP)
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/oryvex.exe"
          if (Test-Path $binary) {
            Compress-Archive -Path $binary -DestinationPath ${{ matrix.archive }}
          } else {
            Write-Error "Binary not found: $binary"
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: oryvex/${{ matrix.archive }}
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Windows 32-bit (x86)
  # ------------------------------------------------------------------
  windows-x86:
    name: Build Windows x86 (32-bit)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: oryvex
    env:
      CFLAGS: "-mlong-double-64"
      CXXFLAGS: "-mlong-double-64"
      BINDGEN_EXTRA_CLANG_ARGS: "-mlong-double-64"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Build release binary (32-bit)
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Package archive (ZIP)
        shell: pwsh
        run: |
          $binary = "target/i686-pc-windows-msvc/release/oryvex.exe"
          if (Test-Path $binary) {
            Compress-Archive -Path $binary -DestinationPath oryvex-windows-x86.zip
          } else {
            Write-Error "Binary not found: $binary"
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oryvex-windows-x86.zip
          path: oryvex/oryvex-windows-x86.zip
          if-no-files-found: error
